<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DFC | Scorecards</title>
  <style>
    :root {
      --red: #C8102E;
      --blue: #003087;
      --black: #0A0A0A;
      --white: #FFFFFF;
      --off-white: #F2F2F2;
      --gray-light: #E0E0E0;
      --gray: #AAAAAA;
      --gold: #E8B923;
      --active-bg: #FFFDE7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--off-white);
      color: var(--black);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--black);
      color: var(--white);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 4px solid var(--red);
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 12px;
    }

    .logo { display: flex; align-items: baseline; flex-shrink: 0; }
    .logo-dfc { font-size: 28px; font-weight: 900; font-style: italic; color: var(--white); letter-spacing: -1px; }
    .logo-sep { color: var(--red); font-size: 28px; font-weight: 900; margin: 0 6px; }
    .logo-sub { font-size: 13px; font-weight: 700; letter-spacing: 4px; color: var(--gray); text-transform: uppercase; }

    .header-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .mode-toggle { display: flex; border: 2px solid #444; border-radius: 2px; overflow: hidden; }
    .mode-btn {
      padding: 6px 12px; background: transparent; color: #888;
      border: none; cursor: pointer; font-size: 11px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; transition: all 0.15s;
    }
    .mode-btn.active { background: var(--white); color: var(--black); }
    .mode-btn:not(.active):hover { background: #222; color: var(--white); }

    .btn {
      padding: 6px 14px; border: 2px solid transparent; cursor: pointer;
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; transition: all 0.15s; white-space: nowrap;
    }
    .btn-wht { background: transparent; border-color: #555; color: var(--white); }
    .btn-wht:hover { background: var(--white); color: var(--black); }
    .btn-red { background: var(--red); color: var(--white); border-color: var(--red); }
    .btn-red:hover { background: #a00e24; }

    /* ── KEY GUIDE BAR ── */
    .key-guide-bar {
      background: #111; border-bottom: 2px solid #222;
      padding: 5px 20px; display: flex; align-items: center; gap: 20px;
      font-size: 11px; flex-wrap: wrap;
    }
    .kg-group { display: flex; align-items: center; gap: 5px; color: #aaa; }
    .kg-label { font-weight: 700; letter-spacing: 1px; font-size: 10px; }
    .kg-label.red { color: #ff4466; }
    .kg-label.blue { color: #4a90d9; }
    kbd {
      display: inline-block; padding: 1px 6px;
      background: #2a2a2a; border: 1px solid #555; border-bottom: 3px solid #555;
      border-radius: 3px; font-family: monospace; font-size: 11px;
      font-weight: 700; color: var(--white);
    }
    .kg-status { margin-left: auto; color: var(--gold); font-weight: 700; font-size: 10px; letter-spacing: 1px; }

    /* ── MAIN ── */
    main { padding: 18px; }

    /* ── OVERVIEW GRID ── */
    #overviewGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }
    #overviewGrid.hidden { display: none; }

    /* ── FOCUS VIEW ── */
    #focusView { display: none; }
    #focusView.visible { display: block; }

    .focus-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
    .back-btn {
      background: var(--black); color: var(--white); border: none;
      padding: 8px 16px; font-size: 11px; font-weight: 700; letter-spacing: 1px; cursor: pointer;
    }
    .back-btn:hover { background: #333; }

    .focus-fight-nav { display: flex; gap: 5px; }
    .ffn-btn {
      width: 36px; height: 34px; border: 2px solid var(--black);
      background: transparent; font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .ffn-btn.active { background: var(--black); color: var(--white); }
    .ffn-btn:not(.active):hover { background: var(--gray-light); }

    .focus-card-wrap { max-width: 700px; margin: 0 auto; }

    /* ── FIGHT CARD ── */
    .fight-card {
      background: var(--white);
      border: 3px solid var(--black);
      box-shadow: 4px 4px 0 var(--black);
      cursor: pointer;
      transition: box-shadow 0.12s, transform 0.12s;
    }
    .fight-card:hover { box-shadow: 6px 6px 0 var(--black); transform: translate(-2px, -2px); }
    .fight-card.is-active {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px var(--gold), 4px 4px 0 var(--black);
    }
    .fight-card.is-active:hover { box-shadow: 0 0 0 2px var(--gold), 6px 6px 0 var(--black); }

    .card-header {
      background: var(--black); padding: 6px 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-fight-num { font-size: 12px; font-weight: 900; color: var(--white); letter-spacing: 2px; }
    .card-hdr-right { display: flex; align-items: center; gap: 8px; }
    .active-badge { font-size: 9px; color: var(--gold); font-weight: 700; letter-spacing: 1px; }
    .zoom-btn {
      background: transparent; border: 1px solid #555; color: #aaa;
      padding: 2px 7px; font-size: 10px; cursor: pointer; font-weight: 600;
    }
    .zoom-btn:hover { background: #333; color: var(--white); }

    /* winner banner */
    .winner-banner {
      padding: 7px 10px; text-align: center;
      font-size: 13px; font-weight: 900; letter-spacing: 3px; color: var(--white);
    }
    .winner-banner.red  { background: var(--red); }
    .winner-banner.blue { background: var(--blue); }
    .winner-banner.draw { background: #555; }

    .corner-banners { display: grid; grid-template-columns: 1fr 28px 1fr; }
    .corner-banner {
      padding: 5px 8px; font-size: 9px; font-weight: 900;
      letter-spacing: 2px; text-align: center; color: var(--white); text-transform: uppercase;
    }
    .corner-banner.red  { background: var(--red); }
    .corner-banner.blue { background: var(--blue); }
    .corner-banner.vs   { background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 8px; color: #666; }

    /* fighter name inputs */
    .fighter-names-row { display: grid; grid-template-columns: 1fr 28px 1fr; border-bottom: 2px solid var(--black); }
    .name-wrap { position: relative; display: flex; align-items: center; padding: 4px 6px; }
    .name-wrap.red { border-right: 1px solid var(--gray-light); background: #fff5f5; }
    .name-wrap.blue { background: #f5f7ff; }
    .name-input {
      border: 1px solid var(--gray-light); border-radius: 2px;
      padding: 5px 28px 5px 8px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px; text-align: center;
      width: 100%; background: var(--white); color: var(--black); outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      cursor: text;
    }
    .name-input:hover { border-color: var(--gray); }
    .name-input:focus { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(232,185,35,0.25); background: #fffce8; }
    .name-input::placeholder { color: #ccc; font-weight: 400; letter-spacing: 0; text-transform: none; font-style: italic; }
    .name-edit-icon {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      font-size: 10px; color: var(--gray); pointer-events: none; opacity: 0.5;
    }
    .vs-mid {
      background: #111; display: flex; align-items: center;
      justify-content: center; font-size: 8px; font-weight: 900; color: #555;
    }

    /* ── SCORECARD TABLE ── */
    .scorecard-table { width: 100%; border-collapse: collapse; }

    .scorecard-table thead th {
      background: #1c1c1c; color: #777; font-size: 8px; letter-spacing: 1px;
      padding: 4px 2px; text-align: center; border: 1px solid #333;
      font-weight: 700; text-transform: uppercase;
    }

    .scorecard-table tbody tr { transition: background 0.1s; cursor: pointer; }
    .scorecard-table tbody tr:hover td:not(.td-rnum) { background: #fafafa; }
    .scorecard-table tbody tr.round-active td:not(.td-rnum) { background: var(--active-bg); }
    .scorecard-table td { border: 1px solid var(--gray-light); text-align: center; padding: 0; vertical-align: middle; }

    .td-rnum {
      background: var(--black); color: var(--white);
      font-weight: 900; font-size: 13px; width: 28px; min-width: 28px;
      padding: 10px 3px; border-color: #333;
    }
    .round-active .td-rnum { background: #333; }

    .td-strikes { width: 75px; padding: 7px 5px; }
    .strikes-num { display: block; font-size: 24px; font-weight: 900; line-height: 1; }
    .td-strikes.red  .strikes-num { color: var(--red); }
    .td-strikes.blue .strikes-num { color: var(--blue); }

    .td-score { width: 50px; }
    .score-inp {
      width: 100%; border: none; border-bottom: 2px solid transparent;
      padding: 6px 2px; font-size: 19px; font-weight: 900;
      text-align: center; background: transparent; outline: none;
      appearance: textfield; -moz-appearance: textfield;
      transition: border-color 0.15s, background 0.15s;
    }
    .score-inp::-webkit-outer-spin-button,
    .score-inp::-webkit-inner-spin-button { -webkit-appearance: none; }
    .score-inp.red  { color: var(--red); }
    .score-inp.blue { color: var(--blue); }
    .score-inp:focus { border-bottom-color: var(--gold); background: var(--active-bg); }

    /* total row */
    .tr-total td { background: #111; color: var(--white); padding: 5px 4px; border-color: #333; }
    .td-total-rnum { background: #0a0a0a !important; font-size: 7px; letter-spacing: 1.5px; color: #555 !important; font-weight: 700; }
    .total-pts { font-size: 10px; color: #888; display: block; }

    .total-sc-inp {
      width: 100%; border: none; border-bottom: 2px solid transparent;
      padding: 4px 2px; font-size: 19px; font-weight: 900;
      text-align: center; background: transparent; outline: none;
      appearance: textfield; -moz-appearance: textfield; cursor: text; color: inherit;
    }
    .total-sc-inp::-webkit-outer-spin-button,
    .total-sc-inp::-webkit-inner-spin-button { -webkit-appearance: none; }
    .total-sc-inp.red  { color: #ff4466; }
    .total-sc-inp.blue { color: #4a90d9; }
    .total-sc-inp:focus { border-bottom-color: var(--gold); }
    .total-sc-inp.overridden { border-bottom-color: #555; }

    /* ── ROUND NAV ── */
    .round-nav { display: flex; border-top: 2px solid var(--black); }
    .rn-btn {
      flex: 1; padding: 6px 4px; background: #f0f0f0; border: none;
      border-right: 1px solid var(--gray); font-size: 10px; font-weight: 700;
      letter-spacing: 1px; cursor: pointer; transition: background 0.1s;
    }
    .rn-btn:last-child { border-right: none; }
    .rn-btn:hover { background: var(--gray-light); }
    .rn-btn.active { background: var(--black); color: var(--white); }

    /* ── WINNER SECTION ── */
    .winner-section { display: flex; align-items: stretch; border-top: 2px solid var(--black); }
    .winner-label {
      padding: 6px 8px; font-size: 8px; font-weight: 700; letter-spacing: 1px;
      color: #999; background: #f0f0f0; border-right: 1px solid var(--gray);
      white-space: nowrap; flex-shrink: 0; display: flex; align-items: center;
    }
    .winner-btn {
      flex: 1; padding: 6px 2px; border: none; border-right: 1px solid var(--gray);
      font-size: 10px; font-weight: 900; letter-spacing: 1px; cursor: pointer;
      background: #f0f0f0; color: #bbb; transition: all 0.15s;
    }
    .winner-btn:last-child { border-right: none; }
    .winner-btn.red-btn:hover  { background: #ffeeee; color: var(--red); }
    .winner-btn.blue-btn:hover { background: #eeeeff; color: var(--blue); }
    .winner-btn.draw-btn:hover { background: #e8e8e8; color: #555; }
    .winner-btn.red-btn.selected  { background: var(--red);  color: var(--white); }
    .winner-btn.blue-btn.selected { background: var(--blue); color: var(--white); }
    .winner-btn.draw-btn.selected { background: #555; color: var(--white); }

    /* ── DESCRIPTION SECTION ── */
    .description-section {
      display: flex; align-items: stretch; border-top: 1px solid var(--gray-light);
    }
    .description-label {
      padding: 6px 8px; font-size: 8px; font-weight: 700; letter-spacing: 1px;
      color: #999; background: #f0f0f0; border-right: 1px solid var(--gray);
      white-space: nowrap; flex-shrink: 0; display: flex; align-items: center;
    }
    .description-input {
      flex: 1; border: none; padding: 6px 8px;
      font-size: 11px; font-weight: 600; font-family: Arial, Helvetica, sans-serif;
      color: var(--black); background: #fafafa; outline: none;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .description-input::placeholder { color: #ccc; font-weight: 400; text-transform: none; }
    .description-input:focus { background: var(--active-bg); border-bottom: 1px solid var(--gold); }
    .focus-mode .description-input { font-size: 13px; padding: 9px 10px; }
    .focus-mode .description-label { font-size: 10px; padding: 9px 10px; }

    /* ── FOCUS MODE SCALING ── */
    .focus-mode .strikes-num { font-size: 40px; }
    .focus-mode .td-strikes  { width: 110px; padding: 12px 8px; }
    .focus-mode .td-score    { width: 65px; }
    .focus-mode .score-inp   { font-size: 26px; padding: 9px 2px; }
    .focus-mode .total-sc-inp { font-size: 26px; }
    .focus-mode .td-rnum     { font-size: 17px; padding: 14px 5px; width: 38px; min-width: 38px; }
    .focus-mode .scorecard-table thead th { font-size: 10px; padding: 6px 3px; }
    .focus-mode .name-input  { font-size: 14px; padding: 8px 30px 8px 10px; }
    .focus-mode .name-wrap   { padding: 6px 8px; }
    .focus-mode .corner-banner { font-size: 12px; padding: 8px; letter-spacing: 3px; }
    .focus-mode .corner-banners { grid-template-columns: 1fr 38px 1fr; }
    .focus-mode .fighter-names-row { grid-template-columns: 1fr 38px 1fr; }
    .focus-mode .card-fight-num { font-size: 15px; }
    .focus-mode .total-pts   { font-size: 12px; }
    .focus-mode .rn-btn      { font-size: 12px; padding: 9px 4px; }
    .focus-mode .tr-total td { padding: 9px 5px; }
    .focus-mode .zoom-btn    { display: none; }
    .focus-mode .winner-btn  { font-size: 12px; padding: 9px 4px; }
    .focus-mode .winner-label { font-size: 10px; padding: 9px 10px; }
    .focus-mode .winner-banner { font-size: 16px; padding: 10px; }

    @media (max-width: 900px) { #overviewGrid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { #overviewGrid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-dfc">DFC</span>
    <span class="logo-sep"> | </span>
    <span class="logo-sub">SCORECARDS</span>
  </div>
  <div class="header-controls">
    <div class="mode-toggle">
      <button class="mode-btn active" id="btnOv" onclick="setMode('overview')">&#9632;&#9632; OVERVIEW</button>
      <button class="mode-btn" id="btnFc" onclick="setMode('focus')">&#9633; FOCUS</button>
    </div>
    <button class="btn btn-wht" onclick="exportCSV()">&#8595; EXPORT CSV</button>
    <button class="btn btn-red" onclick="resetAll()">&#8635; RESET</button>
  </div>
</header>

<div class="key-guide-bar">
  <div class="kg-group">
    <span class="kg-label red">RED:</span>
    <kbd>W</kbd><span>+1</span>
    <kbd>A</kbd><span>-1</span>
  </div>
  <div class="kg-group">
    <span class="kg-label blue">BLUE:</span>
    <kbd>&#8593;</kbd><span>+1</span>
    <kbd>&#8595;</kbd><span>-1</span>
  </div>
  <div class="kg-group" style="color:#666">Click a card or row to activate &nbsp;|&nbsp; Click total score to override</div>
  <div class="kg-status" id="kgStatus">NO ACTIVE FIGHT</div>
</div>

<main>
  <div id="overviewGrid"></div>

  <div id="focusView">
    <div class="focus-toolbar">
      <button class="back-btn" onclick="setMode('overview')">&#8592; ALL FIGHTS</button>
      <div class="focus-fight-nav" id="focusFightNav"></div>
    </div>
    <div class="focus-card-wrap focus-mode" id="focusCardWrap"></div>
  </div>
</main>

<script>
const FIGHTS = 6, ROUNDS = 3;

const mkFight = (id) => ({
  id,
  redName: '', blueName: '',
  activeRound: 0,
  winner: null,           // null | 'red' | 'blue' | 'draw'
  description: '',        // method of victory e.g. TKO, Split Decision
  redTotalOverride: null, // null = auto-calc from round scores
  blueTotalOverride: null,
  rounds: Array.from({ length: ROUNDS }, () => ({ redPts: 0, bluePts: 0, redScore: 10, blueScore: 10 }))
});

const state = {
  mode: 'overview',
  activeFight: null,
  fights: Array.from({ length: FIGHTS }, (_, i) => mkFight(i + 1))
};

// ── Persistence ────────────────────────────────────────────────────────
function load() {
  try {
    const s = localStorage.getItem('dfc_v3');
    if (s) {
      const p = JSON.parse(s);
      if (Array.isArray(p.fights) && p.fights.length === FIGHTS) {
        // Spread defaults first so new fields are always present
        state.fights = p.fights.map((f, i) => ({ ...mkFight(i + 1), ...f }));
      }
    }
  } catch (_) {}
}

function save() {
  localStorage.setItem('dfc_v3', JSON.stringify({ fights: state.fights }));
}

// ── Render ─────────────────────────────────────────────────────────────
function render() {
  renderGrid();
  if (state.mode === 'focus') renderFocus();
  syncStatus();
}

function renderGrid() {
  const g = document.getElementById('overviewGrid');
  g.innerHTML = '';
  state.fights.forEach((f, i) => g.appendChild(buildCard(f, i, 'ov')));
}

function renderFocus() {
  renderFocusNav();
  renderFocusCard();
}

function renderFocusNav() {
  const nav = document.getElementById('focusFightNav');
  nav.innerHTML = '';
  for (let i = 0; i < FIGHTS; i++) {
    const b = document.createElement('button');
    b.className = 'ffn-btn' + (state.activeFight === i ? ' active' : '');
    b.textContent = i + 1;
    b.onclick = () => { state.activeFight = i; renderFocus(); syncStatus(); };
    nav.appendChild(b);
  }
}

function renderFocusCard() {
  const w = document.getElementById('focusCardWrap');
  w.innerHTML = '';
  const i = state.activeFight ?? 0;
  w.appendChild(buildCard(state.fights[i], i, 'fc'));
}

function syncStatus() {
  const el = document.getElementById('kgStatus');
  if (state.activeFight === null) {
    el.textContent = 'NO ACTIVE FIGHT';
    el.style.color = '#666';
  } else {
    const f = state.fights[state.activeFight];
    el.textContent = `FIGHT #${f.id} — ROUND ${f.activeRound + 1} ACTIVE`;
    el.style.color = 'var(--gold)';
  }
}

// ── Card builder ───────────────────────────────────────────────────────
function buildCard(fight, idx, pfx) {
  const isActive = state.activeFight === idx;
  const isFocus  = pfx === 'fc';

  const card = document.createElement('div');
  card.className = 'fight-card' + (isActive ? ' is-active' : '');
  card.addEventListener('click', (e) => {
    if (['INPUT','BUTTON'].includes(e.target.tagName)) return;
    activate(idx, fight.activeRound);
  });

  // ── Header ──
  const hdr = document.createElement('div');
  hdr.className = 'card-header';
  const num = document.createElement('span');
  num.className = 'card-fight-num';
  num.textContent = `FIGHT #${fight.id}`;
  hdr.appendChild(num);
  const right = document.createElement('div');
  right.className = 'card-hdr-right';
  if (isActive) {
    const badge = document.createElement('span');
    badge.className = 'active-badge';
    badge.textContent = '● ACTIVE';
    right.appendChild(badge);
  }
  if (!isFocus) {
    const zb = document.createElement('button');
    zb.className = 'zoom-btn';
    zb.textContent = 'FOCUS ⤢';
    zb.addEventListener('click', (e) => { e.stopPropagation(); zoomFight(idx); });
    right.appendChild(zb);
  }
  hdr.appendChild(right);
  card.appendChild(hdr);

  // ── Winner banner (if declared) ──
  if (fight.winner) {
    const banner = document.createElement('div');
    banner.className = `winner-banner ${fight.winner}`;
    if (fight.winner === 'draw') {
      banner.textContent = 'DRAW';
    } else {
      const name = fight.winner === 'red'
        ? (fight.redName  || 'RED')
        : (fight.blueName || 'BLUE');
      banner.textContent = `${name.toUpperCase()} WINS`;
    }
    card.appendChild(banner);
  }

  // ── Corner banners ──
  card.insertAdjacentHTML('beforeend', `
    <div class="corner-banners">
      <div class="corner-banner red">RED CORNER</div>
      <div class="corner-banner vs">VS</div>
      <div class="corner-banner blue">BLUE CORNER</div>
    </div>`);

  // ── Fighter name inputs ──
  const nr = document.createElement('div');
  nr.className = 'fighter-names-row';
  nr.appendChild(mkNameWrap(idx, 'red',  fight.redName));
  const vsMid = document.createElement('div');
  vsMid.className = 'vs-mid';
  vsMid.textContent = 'VS';
  nr.appendChild(vsMid);
  nr.appendChild(mkNameWrap(idx, 'blue', fight.blueName));
  card.appendChild(nr);

  // ── Scorecard table ──
  const tbl = document.createElement('table');
  tbl.className = 'scorecard-table';
  tbl.innerHTML = `<thead><tr>
    <th>STRIKES</th><th>SCORE</th><th>RD</th><th>SCORE</th><th>STRIKES</th>
  </tr></thead>`;

  const tbody = document.createElement('tbody');

  fight.rounds.forEach((round, rIdx) => {
    const tr = document.createElement('tr');
    if (isActive && fight.activeRound === rIdx) tr.classList.add('round-active');
    tr.addEventListener('click', (e) => {
      if (e.target.tagName === 'INPUT') return;
      activate(idx, rIdx);
    });

    const mkStrikesCell = (corner, pts) => {
      const td = document.createElement('td');
      td.className = `td-strikes ${corner}`;
      const el = document.createElement('span');
      el.className = 'strikes-num';
      el.id = `${pfx}-${idx}-${rIdx}-${corner}`;
      el.textContent = pts;
      td.appendChild(el);
      return td;
    };

    tr.appendChild(mkStrikesCell('red',  round.redPts));

    const tdRSc = document.createElement('td');
    tdRSc.className = 'td-score';
    tdRSc.appendChild(mkScoreInput(pfx, idx, rIdx, 'red', round.redScore));
    tr.appendChild(tdRSc);

    const tdRn = document.createElement('td');
    tdRn.className = 'td-rnum';
    tdRn.textContent = rIdx + 1;
    tr.appendChild(tdRn);

    const tdBSc = document.createElement('td');
    tdBSc.className = 'td-score';
    tdBSc.appendChild(mkScoreInput(pfx, idx, rIdx, 'blue', round.blueScore));
    tr.appendChild(tdBSc);

    tr.appendChild(mkStrikesCell('blue', round.bluePts));

    tbody.appendChild(tr);
  });

  tbody.appendChild(buildTotalRow(fight, idx, pfx));
  tbl.appendChild(tbody);
  card.appendChild(tbl);

  // ── Round nav ──
  const nav = document.createElement('div');
  nav.className = 'round-nav';
  for (let r = 0; r < ROUNDS; r++) {
    const b = document.createElement('button');
    b.className = 'rn-btn' + (isActive && fight.activeRound === r ? ' active' : '');
    b.textContent = `ROUND ${r + 1}`;
    b.addEventListener('click', (e) => { e.stopPropagation(); activate(idx, r); });
    nav.appendChild(b);
  }
  card.appendChild(nav);

  // ── Winner declaration ──
  const ws = document.createElement('div');
  ws.className = 'winner-section';
  const wl = document.createElement('span');
  wl.className = 'winner-label';
  wl.textContent = 'WINNER:';
  ws.appendChild(wl);
  for (const [val, cls, label] of [
    ['red',  'red-btn',  '● RED'],
    ['draw', 'draw-btn', 'DRAW'],
    ['blue', 'blue-btn', '● BLUE']
  ]) {
    const b = document.createElement('button');
    b.className = `winner-btn ${cls}${fight.winner === val ? ' selected' : ''}`;
    b.textContent = label;
    b.addEventListener('click', (e) => { e.stopPropagation(); setWinner(idx, val); });
    ws.appendChild(b);
  }
  card.appendChild(ws);

  // ── Description / method of victory ──
  const ds = document.createElement('div');
  ds.className = 'description-section';
  const dl = document.createElement('span');
  dl.className = 'description-label';
  dl.textContent = 'METHOD:';
  ds.appendChild(dl);
  const di = document.createElement('input');
  di.type = 'text';
  di.className = 'description-input';
  di.placeholder = 'e.g. TKO, Unanimous Decision, Split Decision…';
  di.value = fight.description;
  di.addEventListener('input', (e) => { state.fights[idx].description = e.target.value; save(); });
  di.addEventListener('focus', (e) => { e.stopPropagation(); });
  ds.appendChild(di);
  card.appendChild(ds);

  return card;
}

function buildTotalRow(fight, idx, pfx) {
  const tr = document.createElement('tr');
  tr.className = 'tr-total';

  const redPts  = fight.rounds.reduce((s, r) => s + r.redPts,  0);
  const bluePts = fight.rounds.reduce((s, r) => s + r.bluePts, 0);
  const autoRed  = fight.rounds.reduce((s, r) => s + r.redScore,  0);
  const autoBlue = fight.rounds.reduce((s, r) => s + r.blueScore, 0);
  const redSc  = fight.redTotalOverride  ?? autoRed;
  const blueSc = fight.blueTotalOverride ?? autoBlue;

  const mkPtsCell = (corner, pts) => {
    const td = document.createElement('td');
    td.className = `td-strikes ${corner}`;
    td.innerHTML = `<span class="total-pts" id="${pfx}-${idx}-tot-pts-${corner}">${pts} PTS</span>`;
    return td;
  };

  tr.appendChild(mkPtsCell('red',  redPts));

  const tdRedSc = document.createElement('td');
  tdRedSc.className = 'td-score';
  tdRedSc.appendChild(mkTotalScoreInput(pfx, idx, 'red',  redSc,  fight.redTotalOverride  !== null));
  tr.appendChild(tdRedSc);

  const mid = document.createElement('td');
  mid.className = 'td-rnum td-total-rnum';
  mid.textContent = 'TOT';
  tr.appendChild(mid);

  const tdBlueSc = document.createElement('td');
  tdBlueSc.className = 'td-score';
  tdBlueSc.appendChild(mkTotalScoreInput(pfx, idx, 'blue', blueSc, fight.blueTotalOverride !== null));
  tr.appendChild(tdBlueSc);

  tr.appendChild(mkPtsCell('blue', bluePts));

  return tr;
}

function mkNameWrap(idx, corner, val) {
  const wrap = document.createElement('div');
  wrap.className = `name-wrap ${corner}`;

  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'name-input';
  inp.placeholder = `${corner === 'red' ? 'RED' : 'BLUE'} FIGHTER NAME`;
  inp.value = val;
  inp.addEventListener('input', (e) => { state.fights[idx][`${corner}Name`] = e.target.value; save(); });
  inp.addEventListener('focus', (e) => { e.stopPropagation(); state.activeFight = idx; syncStatus(); });
  wrap.appendChild(inp);

  const icon = document.createElement('span');
  icon.className = 'name-edit-icon';
  icon.textContent = '✎';
  wrap.appendChild(icon);

  return wrap;
}

function mkScoreInput(pfx, idx, rIdx, corner, val) {
  const inp = document.createElement('input');
  inp.type = 'number';
  inp.min = 7; inp.max = 10;
  inp.className = `score-inp ${corner}`;
  inp.value = val;
  inp.addEventListener('focus', (e) => { e.stopPropagation(); state.activeFight = idx; state.fights[idx].activeRound = rIdx; syncStatus(); });
  const commit = () => {
    let v = parseInt(inp.value);
    if (isNaN(v)) v = 10;
    v = Math.min(10, Math.max(7, v));
    inp.value = v;
    state.fights[idx].rounds[rIdx][`${corner}Score`] = v;
    save();
    refreshTotals(idx);
  };
  inp.addEventListener('change', commit);
  inp.addEventListener('blur', commit);
  return inp;
}

function mkTotalScoreInput(pfx, idx, corner, val, isOverride) {
  const inp = document.createElement('input');
  inp.type = 'number';
  inp.className = `total-sc-inp ${corner}${isOverride ? ' overridden' : ''}`;
  inp.id = `${pfx}-${idx}-tot-sc-${corner}`;
  inp.value = val;
  inp.title = 'Click to override total score. Clear to revert to auto-sum.';
  inp.addEventListener('focus', (e) => { e.stopPropagation(); state.activeFight = idx; syncStatus(); });
  inp.addEventListener('change', () => {
    const v = parseInt(inp.value);
    if (!isNaN(v)) {
      state.fights[idx][`${corner}TotalOverride`] = v;
      inp.classList.add('overridden');
      save();
    }
  });
  inp.addEventListener('blur', () => {
    const raw = inp.value.trim();
    if (raw === '' || isNaN(parseInt(raw))) {
      // Clear override — revert to auto
      state.fights[idx][`${corner}TotalOverride`] = null;
      inp.value = state.fights[idx].rounds.reduce((s, r) => s + r[`${corner}Score`], 0);
      inp.classList.remove('overridden');
      save();
    }
  });
  return inp;
}

// ── Interactions ───────────────────────────────────────────────────────
function activate(idx, rIdx) {
  state.activeFight = idx;
  state.fights[idx].activeRound = rIdx ?? 0;
  if (state.mode === 'overview') render();
  else { renderFocus(); syncStatus(); }
  syncStatus();
}

function zoomFight(idx) {
  state.activeFight = idx;
  setMode('focus');
}

function setMode(m) {
  state.mode = m;
  document.getElementById('btnOv').classList.toggle('active', m === 'overview');
  document.getElementById('btnFc').classList.toggle('active', m === 'focus');
  document.getElementById('overviewGrid').classList.toggle('hidden', m !== 'overview');
  document.getElementById('focusView').classList.toggle('visible', m === 'focus');
  if (m === 'overview') {
    render();
  } else {
    if (state.activeFight === null) state.activeFight = 0;
    renderFocus();
    syncStatus();
  }
}

function setWinner(idx, winner) {
  // Toggle off if clicking the already-selected winner
  state.fights[idx].winner = state.fights[idx].winner === winner ? null : winner;
  save();
  if (state.mode === 'overview') render();
  else renderFocusCard();
}

// ── Fast DOM updates ───────────────────────────────────────────────────
function patchPts(idx, rIdx, corner, val) {
  ['ov', 'fc'].forEach(pfx => {
    const el = document.getElementById(`${pfx}-${idx}-${rIdx}-${corner}`);
    if (el) el.textContent = val;
  });
  refreshTotals(idx);
}

function refreshTotals(idx) {
  const f = state.fights[idx];
  const redPts  = f.rounds.reduce((s, r) => s + r.redPts,  0);
  const bluePts = f.rounds.reduce((s, r) => s + r.bluePts, 0);
  const autoRed  = f.rounds.reduce((s, r) => s + r.redScore,  0);
  const autoBlue = f.rounds.reduce((s, r) => s + r.blueScore, 0);

  ['ov', 'fc'].forEach(pfx => {
    const setTxt = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
    const setVal = (id, v) => { const e = document.getElementById(id); if (e) e.value = v; };
    setTxt(`${pfx}-${idx}-tot-pts-red`,  `${redPts} PTS`);
    setTxt(`${pfx}-${idx}-tot-pts-blue`, `${bluePts} PTS`);
    if (f.redTotalOverride  === null) setVal(`${pfx}-${idx}-tot-sc-red`,  autoRed);
    if (f.blueTotalOverride === null) setVal(`${pfx}-${idx}-tot-sc-blue`, autoBlue);
  });
}

// ── Keyboard ───────────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (state.activeFight === null) return;

  const f = state.fights[state.activeFight];
  const r = f.rounds[f.activeRound];
  let corner = null, delta = 0;

  if      (e.key === 'w' || e.key === 'W') { corner = 'red';  delta =  1; }
  else if (e.key === 'a' || e.key === 'A') { corner = 'red';  delta = -1; }
  else if (e.key === 'ArrowUp')            { corner = 'blue'; delta =  1; }
  else if (e.key === 'ArrowDown')          { corner = 'blue'; delta = -1; }

  if (!corner) return;
  e.preventDefault();

  const key = corner === 'red' ? 'redPts' : 'bluePts';
  r[key] = Math.max(0, r[key] + delta);
  save();
  patchPts(state.activeFight, f.activeRound, corner, r[key]);
});

// ── CSV Export ─────────────────────────────────────────────────────────
function exportCSV() {
  const cols = [
    'Fight','Corner','Fighter Name',
    'R1 Strikes','R1 Score','R2 Strikes','R2 Score','R3 Strikes','R3 Score',
    'Total Score','Result','Method'
  ];
  const rows = [cols];

  state.fights.forEach((f) => {
    const autoRed  = f.rounds.reduce((s, r) => s + r.redScore,  0);
    const autoBlue = f.rounds.reduce((s, r) => s + r.blueScore, 0);
    const redTotal  = f.redTotalOverride  ?? autoRed;
    const blueTotal = f.blueTotalOverride ?? autoBlue;

    const result = (corner) => {
      if (!f.winner) return '';
      if (f.winner === 'draw') return 'DRAW';
      return f.winner === corner ? 'WIN' : 'LOSS';
    };

    rows.push([
      `Fight ${f.id}`, 'RED', f.redName || 'Red Corner',
      f.rounds[0].redPts, f.rounds[0].redScore,
      f.rounds[1].redPts, f.rounds[1].redScore,
      f.rounds[2].redPts, f.rounds[2].redScore,
      redTotal, result('red'), f.description || ''
    ]);
    rows.push([
      `Fight ${f.id}`, 'BLUE', f.blueName || 'Blue Corner',
      f.rounds[0].bluePts, f.rounds[0].blueScore,
      f.rounds[1].bluePts, f.rounds[1].blueScore,
      f.rounds[2].bluePts, f.rounds[2].blueScore,
      blueTotal, result('blue'), ''
    ]);
  });

  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' })),
    download: `DFC_Scorecards_${new Date().toISOString().slice(0,10)}.csv`
  });
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ── Reset ──────────────────────────────────────────────────────────────
function resetAll() {
  if (!confirm('Reset all 6 scorecards? This cannot be undone.')) return;
  state.fights = Array.from({ length: FIGHTS }, (_, i) => mkFight(i + 1));
  state.activeFight = null;
  save();
  render();
}

// ── Init ───────────────────────────────────────────────────────────────
load();
render();
</script>
